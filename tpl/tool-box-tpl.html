<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool Box App Template</title>
  <style>
    /* ============================================
       Tool Box App Template - 統一スタイル
       
       【テンプレート構造】
       このテンプレートは以下の領域で構成されています。
       各領域は独立しており、必要に応じて使用・追加・削除が可能です。
       
       1. ヘッダー領域
          - アプリタイトル
          - ダークモード切り替えボタン
          - （各種ボタンや必要に応じたハンバーガーメニューなど）
       
       2. 説明セクション（文字領域）
          - アプリの説明や注意事項を記述
          - 使用しない場合は削除可能
       
       3. コントロールパネル（パラメータ調整領域）
          - スライダー、数値入力、テキスト入力、セレクトボックス
          - チェックボックス、ラジオボタン
          - 必要なコントロールのみ使用
       
       4. メディア領域
          - ファイルインポート/エクスポート機能
          - 使用しない場合は削除可能
       
       5. 描画領域
          - Canvas要素による描画エリア
          - 各アプリで描画ロジックを実装
       
       【使用方法】
       - 必要な領域のみを使用し、不要な領域は削除してください
       - 各領域のスタイルは独立しているため、順序を変更しても問題ありません
       - JavaScriptの関数も同様に、必要なもののみ実装してください
       ============================================ */
    
    /* ============================================
       CSS変数定義
       ============================================ */
    
    /* ライトモード（nattsu-gallery を参考） */
    :root {
      --accent: #628878;
      --accent-hover: #4a6b5a;
      --accent-dark: #4d6b5f;
      --accent-light: #e8f0ec;
      --accent-bg: rgba(98, 136, 120, 0.15);
      --bg-primary: #f5f5f5;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e8eaed;
      --bg-panel: #ffffff;
      --border-color: #d1d5db;
      --border-light: #e5e7eb;
      --text-primary: #333;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
      --canvas-bg: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    /* ダークモード */
    html.dark-mode {
      --accent: #628878;
      --accent-hover: #7aa08a;
      --accent-light: #2a3d32;
      --accent-dark: #628878;
      --accent-bg: rgba(98, 136, 120, 0.2);
      --bg-primary: #1a1a1a;
      --bg-secondary: #252525;
      --bg-tertiary: #2d2d2d;
      --bg-panel: #2a2a2a;
      --border-color: #404040;
      --border-light: #353535;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --text-muted: #888888;
      --canvas-bg: #1f1f1f;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.4);
    }

    /* ============================================
       基本要素（common を参考）
       ============================================ */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      user-select: none;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
    }

    h2 {
      color: var(--text-primary);
      margin: 0.5em 0;
      font-weight: 600;
      font-size: 1.25em;
    }

    p {
      line-height: 1.7;
      color: var(--text-secondary);
      margin: 0.5em 0;
    }

    /* ============================================
       ヘッダー領域（gallery header を参考）
       ============================================ */
    
    .header {
      background: var(--bg-secondary);
      padding: 0.5rem 1rem;
      margin-bottom: 1rem;
      border-bottom: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .header-content {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .header h1 {
      margin: 0;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .theme-toggle {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      width: 32px;
      height: 32px;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9em;
      color: var(--text-primary);
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      background-color: var(--bg-secondary);
      transform: translateY(-50%) scale(1.1);
    }

    .theme-toggle:active {
      transform: translateY(-50%) scale(0.95);
    }

    .theme-toggle .theme-icon {
      display: block;
      line-height: 1;
    }

    .theme-toggle .theme-toggle-text {
      display: none;
    }

    /* ============================================
       説明セクション（文字領域）
       ============================================ */
    
    .info-section {
      background: var(--accent-bg);
      border-left: 4px solid var(--accent);
      padding: 1.25rem;
      margin: 1rem 0;
      border-radius: 8px;
    }

    .info-section p {
      margin: 0.75em 0;
      color: var(--text-primary);
    }

    .info-section p:first-child {
      margin-top: 0;
    }

    .info-section p:last-child {
      margin-bottom: 0;
    }

    /* ============================================
       コントロールパネル（パラメータ調整領域）
       ============================================ */
    
    .control-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1rem;
      padding: 1.25rem;
      background-color: var(--bg-panel);
      border-radius: 8px;
      border: 1px solid var(--border-light);
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 1em;
    }

    .control-row label {
      flex-shrink: 0;
      width: 200px;
      text-align: right;
      color: var(--text-primary);
      font-size: 0.95em;
      font-weight: 500;
    }

    .control-row .value-label {
      width: 100px;
      text-align: right;
      flex-shrink: 0;
      color: var(--accent-dark);
      font-weight: 700;
      font-size: 0.95em;
      letter-spacing: 0.01em;
    }

    .control-row.disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    /* スライダー */
    .control-row input[type="range"] {
      flex-grow: 1;
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .control-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .control-row input[type="range"]::-webkit-slider-thumb:hover {
      background: var(--accent-hover);
      transform: scale(1.1);
      box-shadow: var(--shadow-md);
    }

    .control-row input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .control-row input[type="range"]::-moz-range-thumb:hover {
      background: var(--accent-hover);
      transform: scale(1.1);
      box-shadow: var(--shadow-md);
    }

    /* テキスト入力・数値入力 */
    .control-row input[type="number"],
    .control-row input[type="text"] {
      flex-grow: 1;
      padding: 0.5em;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-size: 0.95em;
    }

    /* セレクトボックス */
    .control-row select {
      flex-grow: 1;
      padding: 0.5em;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-size: 0.95em;
      cursor: pointer;
    }

    /* チェックボックス */
    .control-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    /* ラジオボタングループ */
    .radio-group {
      display: flex;
      gap: 1.5em;
      flex-wrap: wrap;
    }

    .radio-group label {
      width: auto;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5em;
    }

    .radio-group input[type="radio"] {
      cursor: pointer;
      accent-color: var(--accent);
    }

    /* ============================================
       メディア領域
       ============================================ */
    
    .media-section {
      margin: 1.5em 0;
      padding: 1.25em;
      background-color: var(--bg-panel);
      border-radius: 8px;
      border: 1px solid var(--border-light);
    }

    .media-buttons {
      display: flex;
      gap: 0.75em;
      margin-bottom: 0;
      justify-content: center;
    }

    .media-buttons button,
    .media-buttons a.primary {
      min-height: 44px;
      padding: 0.5rem 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 8px;
      white-space: nowrap;
      box-sizing: border-box;
    }
    .media-buttons a.primary {
      text-decoration: none;
    }

    .media-info {
      margin-top: 1em;
      padding: 0.875em;
      background-color: var(--bg-secondary);
      border-radius: 6px;
      font-size: 0.85em;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .media-info:empty {
      display: none;
    }

    input[type="file"] {
      display: none;
    }

    /* ============================================
       描画領域
       ============================================ */
    
    .canvas-container {
      margin: 1.5em 0;
    }

    .canvas-wrapper {
      position: relative;
      background-color: var(--canvas-bg);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .canvas-wrapper canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    .canvas-title {
      margin-bottom: 0.75em;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 1.1em;
      letter-spacing: -0.01em;
    }

    /* ============================================
       ボタン
       ============================================ */
    
    button,
    a.primary[download] {
      background-color: var(--bg-panel);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
      min-height: 2.25rem;
      box-sizing: border-box;
    }
    button {
      width: auto;
      min-width: 0;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    button:active {
      transform: scale(0.98);
    }

    button.primary {
      background-color: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.primary:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #fff;
    }

    /* セクション表示アニメーション（gallery を参考） */
    .info-section,
    .control-panel,
    .media-section,
    .canvas-container {
      animation: section-in 0.35s ease-out backwards;
    }

    .control-panel { animation-delay: 0.05s; }
    .media-section { animation-delay: 0.1s; }
    .canvas-container { animation-delay: 0.15s; }

    @keyframes section-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>
<body>
  <!-- ヘッダー領域 -->
  <header class="header">
    <div class="header-content">
      <h1>アプリタイトル</h1>
      <button class="theme-toggle" id="themeToggle" title="ダークモード切り替え">
        <span class="theme-icon">🌙</span>
        <span class="theme-toggle-text">ダーク</span>
      </button>
    </div>
  </header>

  <div class="container">
    <!-- 説明セクション（文字領域） - 使用しない場合は削除可能 -->
    <div class="info-section">
      <p>このアプリの説明をここに記述します。</p>
      <p>※ 注意事項や補足説明があればここに記述します。</p>
    </div>

    <!-- コントロールパネル（パラメータ調整領域） - 必要なコントロールのみ使用 -->
    <div class="control-panel">
      <!-- スライダーコントロールの例 -->
      <div class="control-row">
        <label for="param1">パラメータ1</label>
        <input id="param1" type="range" min="0" max="100" step="1" value="50" />
        <div class="value-label" id="param1Label">50</div>
      </div>

      <div class="control-row">
        <label for="param2">パラメータ2</label>
        <input id="param2" type="range" min="0" max="100" step="1" value="30" />
        <div class="value-label" id="param2Label">30</div>
      </div>

      <!-- 数値入力の例 -->
      <div class="control-row">
        <label for="param3">パラメータ3</label>
        <input id="param3" type="number" min="0" max="100" value="10" />
        <div class="value-label"></div>
      </div>

      <!-- テキスト入力の例 -->
      <div class="control-row">
        <label for="param4">パラメータ4</label>
        <input id="param4" type="text" value="テキスト" />
        <div class="value-label"></div>
      </div>

      <!-- セレクトボックスの例 -->
      <div class="control-row">
        <label for="param5">パラメータ5</label>
        <select id="param5">
          <option value="option1">オプション1</option>
          <option value="option2">オプション2</option>
          <option value="option3">オプション3</option>
        </select>
        <div class="value-label"></div>
      </div>

      <!-- チェックボックスの例 -->
      <div class="control-row">
        <label for="enableOption">オプション有効化</label>
        <input id="enableOption" type="checkbox" checked />
        <div class="value-label"></div>
      </div>

      <!-- ラジオボタングループの例 -->
      <div class="control-row">
        <label>モード選択</label>
        <div class="radio-group">
          <label><input type="radio" name="mode" value="mode1" checked>モード1</label>
          <label><input type="radio" name="mode" value="mode2">モード2</label>
          <label><input type="radio" name="mode" value="mode3">モード3</label>
        </div>
      </div>
    </div>

    <!-- メディア領域 - 使用しない場合は削除可能 -->
    <div class="media-section">
      <div class="media-buttons">
        <button id="importBtn" class="primary" title="インポート">↑</button>
        <button id="downloadBtn" title="ダウンロード">↓</button>
      </div>
      <input type="file" id="fileInput" accept="image/*,video/*,audio/*" />
      <div class="media-info" id="mediaInfo"></div>
    </div>

    <!-- 描画領域 -->
    <div class="canvas-container">
      <p class="canvas-title"><b>title</b></p>
      <div class="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
      </div>
    </div>
  </div>

  <script>
    /***********************************************************************
     * Tool Box App Template - JavaScript構造
     * 
     * このテンプレートは汎用的なアプリの基本構造を提供します。
     * 各アプリで必要な部分を実装してください。
     * 
     * 【構造】
     * 1. グローバル変数
     * 2. ユーティリティ関数
     * 3. UIパラメータ取得
     * 4. 描画処理
     * 5. メディア処理（使用しない場合は削除可能）
     * 6. UIイベントリスナー
     * 7. ダークモード切り替え
     * 8. 初期化
     * 
     * 【使用方法】
     * - 必要な機能のみ実装し、不要な部分は削除してください
     * - 各関数は独立しているため、順序を変更しても問題ありません
     ***********************************************************************/

    /***********************************************************************
     * グローバル変数
     ***********************************************************************/
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    // メディア関連（使用しない場合は削除可能）
    let currentMediaFile = null;
    let currentMediaType = null;
    let currentMediaData = null;

    /***********************************************************************
     * ユーティリティ関数
     ***********************************************************************/

    /**
     * キャンバスサイズをリサイズ
     */
    function resizeCanvas() {
      const wrapper = canvas.parentElement;
      canvas.width = wrapper.clientWidth;
      canvas.height = Math.floor(wrapper.clientWidth * 0.6); // アスペクト比を調整
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    /**
     * CSS変数を取得
     * @param {string} varName - CSS変数名（--で始まる）
     * @returns {string} CSS変数の値
     */
    function getCSSVar(varName) {
      return getComputedStyle(document.documentElement)
        .getPropertyValue(varName).trim();
    }

    /***********************************************************************
     * UIパラメータ取得
     ***********************************************************************/

    /**
     * UIからパラメータを取得
     * アプリ固有のパラメータをここで定義
     * @returns {Object} パラメータオブジェクト
     */
    function getParams() {
      const param1 = Number(document.getElementById("param1").value);
      const param2 = Number(document.getElementById("param2").value);
      const param3 = Number(document.getElementById("param3").value);
      const param4 = document.getElementById("param4").value;
      const param5 = document.getElementById("param5").value;
      const enableOption = document.getElementById("enableOption").checked;
      const mode = document.querySelector('input[name="mode"]:checked').value;

      return {
        param1,
        param2,
        param3,
        param4,
        param5,
        enableOption,
        mode
      };
    }

    /**
     * UIラベルを更新
     */
    function updateLabels() {
      const p = getParams();
      document.getElementById("param1Label").textContent = p.param1;
      document.getElementById("param2Label").textContent = p.param2;
    }

    /***********************************************************************
     * 描画処理
     ***********************************************************************/

    /**
     * メイン描画関数
     * 各アプリで実装してください
     */
    function draw() {
      const w = canvas.width;
      const h = canvas.height;
      const p = getParams();

      // 背景をクリア
      ctx.fillStyle = getCSSVar('--canvas-bg') || '#ffffff';
      ctx.fillRect(0, 0, w, h);

      // ここに描画ロジックを実装
      // 例: シンプルな図形の描画
      // ctx.fillStyle = getCSSVar('--accent') || '#628878';
      // ctx.fillRect(w * 0.1, h * 0.1, w * 0.8, h * 0.8);
    }

    /**
     * 描画ループ（必要に応じて使用）
     */
    function drawLoop() {
      draw();
      requestAnimationFrame(drawLoop);
    }

    // 必要に応じて描画ループを開始
    // drawLoop();

    /***********************************************************************
     * メディア処理（使用しない場合は削除可能）
     ***********************************************************************/

    /**
     * ファイルをインポート
     */
    function importMedia(file) {
      currentMediaFile = file;
      currentMediaType = file.type.split('/')[0];
      
      // ファイル詳細を表示
      const mediaInfo = document.getElementById('mediaInfo');
      const fileSizeKB = (file.size / 1024).toFixed(2);
      const fileSizeMB = (file.size / 1024 / 1024).toFixed(2);
      const sizeText = file.size > 1024 * 1024 ? `${fileSizeMB} MB` : `${fileSizeKB} KB`;
      
      mediaInfo.innerHTML = `
        <strong>ファイル名:</strong> ${file.name}<br>
        <strong>タイプ:</strong> ${file.type || '不明'}<br>
        <strong>サイズ:</strong> ${sizeText}
      `;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        currentMediaData = e.target.result;
        if (currentMediaType === 'image') {
          handleImageImport(e.target.result);
        } else if (currentMediaType === 'video') {
          handleVideoImport(e.target.result);
        } else if (currentMediaType === 'audio') {
          handleAudioImport(e.target.result);
        }
        draw();
      };
      reader.readAsDataURL(file);
    }

    /**
     * 画像インポート処理
     * 各アプリで実装してください
     */
    function handleImageImport(dataUrl) {
      // 例: 画像をCanvasに描画
      // const img = new Image();
      // img.onload = function() {
      //   ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      // };
      // img.src = dataUrl;
    }

    /**
     * 動画インポート処理
     * 各アプリで実装してください
     */
    function handleVideoImport(dataUrl) {
      // 各アプリで実装
    }

    /**
     * 音声インポート処理
     * 各アプリで実装してください
     */
    function handleAudioImport(dataUrl) {
      // 各アプリで実装
    }

    /**
     * メディアをダウンロード
     */
    function downloadMedia() {
      canvas.toBlob(function(blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `output_${Date.now()}.png`;
        a.click();
        URL.revokeObjectURL(url);
      });
    }

    /***********************************************************************
     * UIイベントリスナー
     ***********************************************************************/

    // コントロールの変更時にラベル更新と再描画
    const controls = document.querySelectorAll(
      'input[type="range"], input[type="number"], input[type="text"], input[type="checkbox"], select, input[name="mode"]'
    );
    controls.forEach(ctrl => {
      ctrl.addEventListener('input', () => {
        updateLabels();
        draw();
      });
      ctrl.addEventListener('change', () => {
        updateLabels();
        draw();
      });
    });

    // メディアインポートボタン（使用しない場合は削除可能）
    const importBtn = document.getElementById('importBtn');
    const fileInput = document.getElementById('fileInput');
    
    importBtn.addEventListener('click', () => {
      fileInput.click();
    });
    
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        importMedia(file);
      }
    });

    // メディアダウンロードボタン（使用しない場合は削除可能）
    const downloadBtn = document.getElementById('downloadBtn');
    downloadBtn.addEventListener('click', () => {
      downloadMedia();
    });

    /***********************************************************************
     * ダークモード切り替え
     ***********************************************************************/
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('.theme-icon');
    const themeText = themeToggle.querySelector('.theme-toggle-text');
    
    // ローカルストレージから保存された設定を読み込む
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    // 初期状態を設定
    function setTheme(isDark) {
      if (isDark) {
        document.documentElement.classList.add('dark-mode');
        themeIcon.textContent = '☀️';
        themeText.textContent = 'ライト';
      } else {
        document.documentElement.classList.remove('dark-mode');
        themeIcon.textContent = '🌙';
        themeText.textContent = 'ダーク';
      }
    }
    
    // 保存された設定があればそれを使用、なければシステム設定を使用
    if (savedTheme) {
      setTheme(savedTheme === 'dark');
    } else {
      setTheme(prefersDark);
    }
    
    // ボタンクリックで切り替え
    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.classList.contains('dark-mode');
      setTheme(!isDark);
      localStorage.setItem('theme', !isDark ? 'dark' : 'light');
      draw(); // テーマ変更時に再描画
    });
    
    // システム設定の変更を監視（手動切り替えしていない場合のみ）
    if (window.matchMedia) {
      const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
      mediaQuery.addEventListener('change', (e) => {
        // 手動で設定していない場合のみシステム設定に従う
        if (!localStorage.getItem('theme')) {
          setTheme(e.matches);
          draw(); // テーマ変更時に再描画
        }
      });
    }

    /***********************************************************************
     * 初期化
     ***********************************************************************/
    updateLabels();
    draw(); // 初期描画
  </script>
</body>
</html>
