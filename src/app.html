<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f5" />
    <script>
      (function() {
        try {
          if (localStorage.getItem('music-visualizer-dark') === '1') {
            document.documentElement.classList.add('dark-mode');
          }
        } catch (e) {}
      })();
    </script>
    <!-- 初回描画用クリティカルCSS（フォント/背景のちらつき防止） -->
    <style>
      :root{--bg-primary:#f5f5f5;--text-primary:#333;--safe-area-top:env(safe-area-inset-top,0);--safe-area-right:env(safe-area-inset-right,0);--safe-area-bottom:env(safe-area-inset-bottom,0);--safe-area-left:env(safe-area-inset-left,0);}
      html.dark-mode{--bg-primary:#1a1a1a;--text-primary:#f0f0f0;}
      *{margin:0;padding:0;box-sizing:border-box;}
      html,body{overscroll-behavior:none;}
      body{background-color:var(--bg-primary);color:var(--text-primary);
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        font-size:15px;line-height:1.5;min-height:100vh;
        padding-left:var(--safe-area-left);padding-right:var(--safe-area-right);padding-bottom:var(--safe-area-bottom);}
    </style>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Music Visualizer</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
